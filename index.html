<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antunez – Administración</title>
<meta name="description" content="Sistema de administración Antunez - Cuidado Personal">
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  /* Fonts loaded inline for offline support with graceful fallback */
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
</style>
<style>
  :root {
    --bg: #f0eaf7;
    --bg2: #e8dff3;
    --surface: #faf7fd;
    --surface2: #f3edf9;
    --border: #d8cce8;
    --accent: #8b5fbf;
    --accent-light: #c4a8e8;
    --text: #2d1f3d;
    --text2: #6b5a80;
    --text3: #9e8fb0;
    --moises: #e74c6c;
    --yohali: #9b59b6;
    --casa: #27ae60;
    --shadow: 0 4px 24px rgba(100,60,160,0.10);
    --shadow2: 0 2px 12px rgba(100,60,160,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(180,140,230,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 80%, rgba(140,100,200,0.13) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #6b3f9f 0%, #9b6ecf 60%, #c4a0e8 100%);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 20px;
    box-shadow: 0 4px 30px rgba(80,30,140,0.20);
    position: sticky; top: 0; z-index: 100;
  }
  .logo-wrap { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.35);
    backdrop-filter: blur(8px);
  }
  .logo-icon svg { width: 30px; height: 30px; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 2px; text-shadow: 0 2px 8px rgba(60,20,100,0.3); }
  .logo-sub { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
  .header-right { margin-left: auto; }
  .header-badge { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 6px 14px; color: #fff; font-size: 12px; font-weight: 500; letter-spacing: 1px; }

  /* TABS */
  .tabs-bar {
    display: flex; align-items: center; gap: 4px;
    padding: 16px 32px 0;
    overflow-x: auto; scrollbar-width: none;
    border-bottom: 2px solid var(--border);
    background: var(--surface);
  }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab {
    background: var(--bg2); border: 1.5px solid var(--border); border-bottom: none;
    border-radius: 10px 10px 0 0; padding: 9px 18px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text2);
    white-space: nowrap; transition: all 0.18s;
    display: flex; align-items: center; gap: 8px;
    position: relative; bottom: -2px;
  }
  .tab:hover { background: var(--surface2); color: var(--accent); }
  .tab.active { background: var(--surface); border-color: var(--accent-light); color: var(--accent); font-weight: 600; border-bottom: 2px solid var(--surface); }
  .tab .close-tab { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 0 0 0 4px; transition: color 0.15s; line-height: 1; }
  .tab .close-tab:hover { color: #e74c6c; }
  .add-tab-btn {
    background: none; border: 1.5px dashed var(--accent-light); border-radius: 8px;
    width: 34px; height: 34px; cursor: pointer; color: var(--accent); font-size: 22px;
    display: flex; align-items: center; justify-content: center; transition: all 0.18s;
    flex-shrink: 0; bottom: -2px; position: relative;
  }
  .add-tab-btn:hover { background: var(--surface2); border-style: solid; }

  /* MAIN */
  .main { padding: 28px 32px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .panel-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .panel-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--text); }
  .date-input {
    border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text);
    background: var(--surface); outline: none; transition: border-color 0.15s;
  }
  .date-input:focus { border-color: var(--accent); }

  /* SECTION TITLES */
  .section-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 12px;
  }
  .section-badge {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
  }
  .badge-ventas   { background: #ede8fa; color: var(--accent); border: 1px solid var(--accent-light); }
  .badge-personal { background: #fdeef6; color: #a03070; border: 1px solid #e8b0cc; }
  .badge-paletas  { background: #fff4e0; color: #b06000; border: 1px solid #f0c870; }

  /* GRAN TOTAL */
  .gran-total-wrap {
    background: linear-gradient(135deg, #3d1a6e 0%, #6b3f9f 60%, #9b6ecf 100%);
    border-radius: 20px; padding: 24px 28px;
    margin-top: 8px; margin-bottom: 8px;
    box-shadow: 0 8px 32px rgba(80,30,140,0.22);
  }
  .gran-total-title {
    font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700;
    color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
  }
  .gran-total-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .gt-card {
    background: rgba(255,255,255,0.13); border-radius: 14px; padding: 14px 18px;
    border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; gap: 12px;
  }
  .gt-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; background: rgba(255,255,255,0.18); }
  .gt-info .gt-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-bottom: 3px; }
  .gt-info .gt-val { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #fff; }
  .gt-total-row {
    border-top: 1px solid rgba(255,255,255,0.2); padding-top: 14px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .gt-total-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.75); }
  .gt-total-value { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #fff; }
  .table-wrap.paletas-table { border-color: #f0c870; }
  .t-paletas thead { background: linear-gradient(90deg, #c07000 0%, #e8a030 100%); }
  table.t-paletas { min-width: 800px; }
  .add-row-btn.paletas { border-color: #f0c870; color: #b06000; }
  .add-row-btn.paletas:hover { background: #fff8e8; }
  .tc-paletas-costo    .total-icon { background: #fff4e0; }
  .tc-paletas-ganancia .total-icon { background: #e8f8ee; }
  .tc-paletas-costo    .val { color: #b06000; }
  .tc-paletas-ganancia .val { color: var(--casa); }

  /* TABLES */
  .table-wrap {
    background: var(--surface); border-radius: 16px;
    box-shadow: var(--shadow); overflow: hidden;
    border: 1.5px solid var(--border); margin-bottom: 14px; overflow-x: auto;
  }
  .table-wrap.personal-table { border-color: #e0b8d8; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.t-ventas   { min-width: 800px; }
  table.t-personal { min-width: 500px; }
  thead { color: #fff; }
  .t-ventas   thead { background: linear-gradient(90deg, #7c4ab5 0%, #9b6ecf 100%); }
  .t-personal thead { background: linear-gradient(90deg, #b060a0 0%, #d088c0 100%); }
  th {
    padding: 12px 10px; text-align: left;
    font-weight: 600; font-size: 11.5px; letter-spacing: 0.8px; text-transform: uppercase; white-space: nowrap;
  }
  th:first-child { padding-left: 16px; }
  th:last-child { padding-right: 16px; text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 9px 10px; vertical-align: middle; }
  td:first-child { padding-left: 16px; }
  td:last-child { padding-right: 16px; text-align: center; }

  .cell-input {
    border: 1.5px solid transparent; border-radius: 6px; padding: 5px 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text);
    background: transparent; width: 100%; outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .cell-input:focus { border-color: var(--accent-light); background: var(--bg); }
  .cell-input[type="number"] { text-align: right; }
  .cell-calc { font-weight: 500; color: var(--text); text-align: right; white-space: nowrap; }
  .cell-profit     { color: #27ae60; font-weight: 600; }
  .cell-profit-pct { color: #8b5fbf; font-weight: 600; }

  /* PERSONA SELECT */
  .persona-select {
    border: 1.5px solid var(--border); border-radius: 6px; padding: 5px 10px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
    background: var(--surface); outline: none; cursor: pointer; transition: all 0.15s; min-width: 90px;
  }
  .sel-Moises { color: var(--moises); border-color: #f5b8c6; background: #fff8f9; }
  .sel-Yohali { color: var(--yohali); border-color: #d4a8e8; background: #faf5ff; }
  .sel-Casa   { color: var(--casa);   border-color: #a8ddb8; background: #f5fff8; }

  .delete-btn {
    background: none; border: none; cursor: pointer; color: var(--text3);
    font-size: 16px; padding: 4px 6px; border-radius: 6px; transition: all 0.15s; line-height: 1;
  }
  .delete-btn:hover { background: #fde8ed; color: #e74c6c; }

  .add-row-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: none; border: 1.5px dashed var(--accent-light); border-radius: 10px;
    padding: 9px 18px; cursor: pointer; color: var(--accent);
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    transition: all 0.18s; margin-bottom: 22px;
  }
  .add-row-btn:hover { background: var(--surface2); border-style: solid; }
  .add-row-btn.personal { border-color: #e0b8d8; color: #a03070; }
  .add-row-btn.personal:hover { background: #fdeef6; }

  .section-divider { border: none; border-top: 2px dashed var(--border); margin: 4px 0 24px; opacity: 0.5; }

  /* TOTALS */
  .totals-section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 10px; padding-left: 8px;
    border-left: 3px solid var(--accent-light);
  }
  .totals-wrap { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 6px; }
  .total-card {
    background: var(--surface); border-radius: 14px; padding: 15px 18px;
    box-shadow: var(--shadow2); border: 1.5px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .total-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .tc-costo    .total-icon { background: #fff0e0; }
  .tc-ganancia .total-icon { background: #e8f8ee; }
  .tc-personal .total-icon { background: #f5eaff; }
  .tc-moises   .total-icon { background: #fde8ed; }
  .tc-yohali   .total-icon { background: #f2e8fa; }
  .tc-casa     .total-icon { background: #e8f8ee; }
  .total-info .lbl { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
  .total-info .val { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
  .tc-costo    .val { color: #c87d00; }
  .tc-ganancia .val { color: var(--casa); }
  .tc-personal .val { color: var(--yohali); }
  .tc-moises   .val { color: var(--moises); }
  .tc-yohali   .val { color: var(--yohali); }
  .tc-casa     .val { color: var(--casa); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(30,15,50,0.45); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px; padding: 32px; width: 320px; box-shadow: 0 20px 60px rgba(80,30,140,0.25); border: 1.5px solid var(--border); animation: popIn 0.22s cubic-bezier(.4,1.4,.6,1); }
  @keyframes popIn { from { transform: scale(0.85); opacity:0; } to { transform: scale(1); opacity:1; } }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 20px; color: var(--text); }
  .modal label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; margin-top: 14px; }
  .modal input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn-primary { flex: 1; background: linear-gradient(135deg, #7c4ab5, #9b6ecf); color: #fff; border: none; border-radius: 10px; padding: 11px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary { flex: 1; background: var(--bg2); color: var(--text2); border: 1.5px solid var(--border); border-radius: 10px; padding: 11px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-secondary:hover { background: var(--border); }

  @media(max-width:640px){ .main{padding:16px;} .tabs-bar{padding:12px 16px 0;} header{padding:14px 16px;} }

  /* DATA BUTTONS */
  .data-btns { display: flex; align-items: center; gap: 8px; }
  .btn-data {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 10px; padding: 7px 14px; cursor: pointer;
    color: #fff; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
    transition: all 0.18s; white-space: nowrap;
  }
  .btn-data:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.5); }
  .btn-data.guardar { background: rgba(255,255,255,0.22); }
  .btn-data.cargar  { background: rgba(255,200,100,0.25); border-color: rgba(255,220,120,0.5); }
  .save-indicator {
    font-size: 10px; color: rgba(255,255,255,0.6); font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 4px;
  }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: #7fff90; display: inline-block; }
  .save-dot.error { background: #ff5f6d; }
  .save-dot.saving { background: #ffd060; }

  /* ── CORTE DE VENTAS ─────────────────────────────────────────────────────── */
  .corte-wrap {
    background: linear-gradient(135deg, #1a3a2a 0%, #1e5c3a 55%, #2e7d52 100%);
    border-radius: 20px; padding: 24px 28px;
    margin-top: 8px; margin-bottom: 8px;
    box-shadow: 0 8px 32px rgba(20,80,50,0.28);
  }
  .corte-title {
    font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700;
    color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  .corte-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.55); margin-bottom: 10px; padding-left: 8px;
    border-left: 3px solid rgba(255,255,255,0.25);
  }
  .corte-inputs-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;
    margin-bottom: 20px;
  }
  .corte-input-wrap { display: flex; flex-direction: column; gap: 5px; }
  .corte-input-lbl {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .corte-input {
    background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 9px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    color: #fff; outline: none; transition: border-color 0.15s, background 0.15s;
    text-align: right;
  }
  .corte-input::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; font-size: 13px; }
  .corte-input:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.18); }

  /* Tabla deudores */
  .deudores-toggle {
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 7px 14px; color: rgba(255,255,255,0.8);
    font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    transition: all 0.18s; margin-bottom: 12px;
  }
  .deudores-toggle:hover { background: rgba(255,255,255,0.18); }
  .deudores-section { display: none; margin-bottom: 16px; }
  .deudores-section.open { display: block; }
  .deudores-table-wrap {
    background: rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15); margin-bottom: 10px;
  }
  .deudores-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .deudores-table thead { background: rgba(0,0,0,0.2); }
  .deudores-table th {
    padding: 9px 12px; text-align: left; color: rgba(255,255,255,0.7);
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  }
  .deudores-table th:last-child { text-align: center; }
  .deudores-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.08); }
  .deudores-table tbody tr:last-child { border-bottom: none; }
  .deudores-table td { padding: 7px 12px; vertical-align: middle; }
  .deudores-table td:last-child { text-align: center; }
  .corte-cell-input {
    background: transparent; border: 1.5px solid transparent; border-radius: 5px;
    padding: 4px 7px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: #fff; outline: none; width: 100%; transition: border-color 0.15s, background 0.15s;
  }
  .corte-cell-input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
  .corte-cell-input[type="number"] { text-align: right; }
  .corte-cell-input::placeholder { color: rgba(255,255,255,0.3); }
  .corte-delete-btn {
    background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.4);
    font-size: 15px; padding: 3px 6px; border-radius: 5px; transition: all 0.15s; line-height: 1;
  }
  .corte-delete-btn:hover { background: rgba(231,76,108,0.3); color: #ff8fa8; }
  .add-deudor-btn {
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    background: none; border: 1.5px dashed rgba(255,255,255,0.25); border-radius: 8px;
    padding: 7px 14px; color: rgba(255,255,255,0.6);
    font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    transition: all 0.18s;
  }
  .add-deudor-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.45); color: #fff; }

  /* Separador dentro del corte */
  .corte-divider {
    border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 16px 0;
  }

  /* Resultados del corte */
  .corte-resultados-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 10px;
    margin-bottom: 14px;
  }
  .cr-card {
    background: rgba(255,255,255,0.10); border-radius: 13px; padding: 13px 16px;
    border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; gap: 11px;
  }
  .cr-card.highlight { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }
  .cr-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; background: rgba(255,255,255,0.14); }

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let tabs = [];
let activeTab = null;
let tabCounter = 0;
const PERSONAS = ['Moises','Yohali','Casa'];

// ── Utils ─────────────────────────────────────────────────────────────────────
const fmt    = n => (isNaN(n)||n==null) ? '—' : '$'+Number(n).toFixed(2);
const fmtPct = n => (isNaN(n)||!isFinite(n)) ? '—' : n.toFixed(1)+'%';
const newId  = () => 'r'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
const esc    = s => s==null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const pf     = v => { const n=parseFloat(v); return isNaN(n)?NaN:n; };

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${parseInt(day)} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][+m-1]} ${y}`;
}
const tabLabel = t => t.date ? fmtDate(t.date) : t.name;

// ── Tab management ────────────────────────────────────────────────────────────
function createTab(name, date) {
  const id = 'tab_' + (++tabCounter);
  tabs.push({ id, name, date: date||'', ventaRows:[], paletaRows:[], personalRows:[],
    corteVentas: { efectivo:'', transferencia:'', debe:'', deudores:[], descuento:'' } });
  renderTabs();
  setActiveTab(id);
  addVentaRow(id);
  addPaletaRow(id);
  addPersonalRow(id);
}

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  const btn = document.getElementById('addTabBtn');
  bar.querySelectorAll('.tab').forEach(t => t.remove());
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id===activeTab?' active':'');
    el.innerHTML = `<span onclick="setActiveTab('${tab.id}')" style="cursor:pointer">📦 ${esc(tabLabel(tab))}</span>
      <button class="close-tab" onclick="removeTab('${tab.id}')">×</button>`;
    bar.insertBefore(el, btn);
  });
}

function setActiveTab(id) {
  activeTab = id;
  renderTabs();
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel_'+id);
  if (panel) panel.classList.add('active');
  else renderPanel(id);
}

function removeTab(id) {
  if (tabs.length===1) return;
  tabs = tabs.filter(t=>t.id!==id);
  document.getElementById('panel_'+id)?.remove();
  if (activeTab===id) activeTab = tabs[0]?.id||null;
  renderTabs();
  if (activeTab) setActiveTab(activeTab);
}

// ── Panel ─────────────────────────────────────────────────────────────────────
function renderPanel(id) {
  const tab = tabs.find(t=>t.id===id);
  if (!tab) return;
  const div = document.createElement('div');
  div.className = 'tab-panel active';
  div.id = 'panel_'+id;
  div.innerHTML = `
    <div class="panel-header">
      <div class="panel-title">📦 ${esc(tabLabel(tab))}</div>
      <input type="date" class="date-input" value="${tab.date}" onchange="updateTabDate('${id}',this.value)" title="Fecha de compra">
    </div>

    <div class="section-title">🛒 Productos para venta <span class="section-badge badge-ventas">Venta</span></div>
    <div class="table-wrap">
      <table class="t-ventas">
        <thead><tr>
          <th>Cantidad</th><th>Producto</th><th>Costo Unit.</th><th>Precio Unit.</th>
          <th>Utilidad $</th><th>Utilidad %</th><th>Costo Total</th><th>Ganancia Total</th><th>Acción</th>
        </tr></thead>
        <tbody id="vtbody_${id}"></tbody>
      </table>
    </div>
    <button class="add-row-btn" onclick="addVentaRow('${id}')">+ Agregar producto de venta</button>
    <div class="totals-section-label">Resumen de venta</div>
    <div class="totals-wrap" id="vtotals_${id}"></div>

    <hr class="section-divider">

    <div class="section-title">🍭 Paletas <span class="section-badge badge-paletas">Paletas</span></div>
    <div class="table-wrap paletas-table">
      <table class="t-paletas">
        <thead><tr>
          <th>Cantidad</th><th>Producto</th><th>Costo Unit.</th><th>Precio Unit.</th>
          <th>Utilidad $</th><th>Utilidad %</th><th>Costo Total</th><th>Ganancia Total</th><th>Acción</th>
        </tr></thead>
        <tbody id="palbody_${id}"></tbody>
      </table>
    </div>
    <button class="add-row-btn paletas" onclick="addPaletaRow('${id}')">+ Agregar paleta</button>
    <div class="totals-section-label">Resumen de paletas</div>
    <div class="totals-wrap" id="paltotals_${id}"></div>

    <hr class="section-divider">

    <div class="section-title">🏠 Uso personal <span class="section-badge badge-personal">Casa / Familia</span></div>
    <div class="table-wrap personal-table">
      <table class="t-personal">
        <thead><tr>
          <th>Cantidad</th><th>Producto</th><th>Costo Unit.</th><th>Costo Total</th><th>Persona</th><th>Acción</th>
        </tr></thead>
        <tbody id="ptbody_${id}"></tbody>
      </table>
    </div>
    <button class="add-row-btn personal" onclick="addPersonalRow('${id}')">+ Agregar uso personal</button>
    <div class="totals-section-label">Resumen uso personal</div>
    <div class="totals-wrap" id="ptotals_${id}"></div>

    <hr class="section-divider">

    <div class="gran-total-wrap" id="grantotal_${id}">
      <div class="gran-total-title">📊 Resumen General de Costos</div>
      <div class="gran-total-grid" id="grantotal-grid_${id}"></div>
      <div class="gt-total-row">
        <span class="gt-total-label">💰 COSTO TOTAL DE LA COMPRA</span>
        <span class="gt-total-value" id="grantotal-sum_${id}">—</span>
      </div>
    </div>

    <hr class="section-divider">

    <div class="corte-wrap" id="corte_${id}">
      <div class="corte-title">✂️ Corte de Ventas</div>

      <div class="corte-section-label">Ingresos del período</div>
      <div class="corte-inputs-grid">
        <div class="corte-input-wrap">
          <span class="corte-input-lbl">💵 Efectivo</span>
          <input class="corte-input" type="number" min="0" step="any" id="cv-efectivo_${id}" placeholder="0.00"
            oninput="updateCorte('${id}','efectivo',this.value)">
        </div>
        <div class="corte-input-wrap">
          <span class="corte-input-lbl">📲 Transferencia</span>
          <input class="corte-input" type="number" min="0" step="any" id="cv-transferencia_${id}" placeholder="0.00"
            oninput="updateCorte('${id}','transferencia',this.value)">
        </div>
        <div class="corte-input-wrap">
          <span class="corte-input-lbl">⏳ Debe (pendiente)</span>
          <input class="corte-input" type="number" min="0" step="any" id="cv-debe_${id}" placeholder="0.00"
            oninput="updateCorte('${id}','debe',this.value)" title="Se calcula automáticamente si usas la tabla de deudores">
        </div>
      </div>

      <button class="deudores-toggle" id="deudores-toggle_${id}" onclick="toggleDeudores('${id}')">
        👥 Tabla de deudores <span id="deudores-arrow_${id}">▼</span>
      </button>

      <div class="deudores-section" id="deudores-section_${id}">
        <div class="deudores-table-wrap">
          <table class="deudores-table">
            <thead><tr><th>Cliente</th><th style="text-align:right">Monto pendiente</th><th>Acción</th></tr></thead>
            <tbody id="deudores-tbody_${id}"></tbody>
          </table>
        </div>
        <button class="add-deudor-btn" onclick="addDeudor('${id}')">+ Agregar deudor</button>
      </div>

    </div>

    <div class="corte-resultados-wrap" id="corte-resultados_${id}">
      <div class="corte-resultados-placeholder">
        <span>✂️</span> Ingresa las ventas arriba para ver el reparto de ganancias
      </div>
    </div>
  `;
  document.getElementById('mainContent').appendChild(div);
  tab.ventaRows.forEach(r => renderVentaRow(id, r));
  tab.paletaRows.forEach(r => renderPaletaRow(id, r));
  tab.personalRows.forEach(r => renderPersonalRow(id, r));
  refreshTotals(id);
  renderCorteInputs(id);
  (tab.corteVentas?.deudores || []).forEach(d => renderDeudorRow(id, d));
  refreshCorte(id);
}

// ── Calculated cells helpers ──────────────────────────────────────────────────
// Instead of re-rendering the whole TR, we only update the read-only calc cells.
// Each TR gets data-attributes on the calc TDs so we can target them cheaply.

function calcVenta(row) {
  const q=pf(row.cantidad), c=pf(row.costo), p=pf(row.precio);
  const util=(!isNaN(p)&&!isNaN(c))?p-c:NaN;
  const pct =(!isNaN(util)&&c>0)?(util/c)*100:NaN;
  const ct  =(!isNaN(q)&&!isNaN(c))?q*c:NaN;
  const gt  =(!isNaN(q)&&!isNaN(p))?q*p:NaN;
  return [fmt(util), fmtPct(pct), fmt(ct), fmt(gt)];
}

function calcPersonal(row) {
  const q=pf(row.cantidad), c=pf(row.costo);
  const ct=(!isNaN(q)&&!isNaN(c))?q*c:NaN;
  return [fmt(ct)];
}

function updateCalcCells(rowId, values, cssClasses) {
  const tr = document.getElementById('tr_'+rowId);
  if (!tr) return;
  const cells = tr.querySelectorAll('.cell-calc');
  cells.forEach((td, i) => {
    if (values[i] !== undefined) td.textContent = values[i];
  });
}

// ── VENTA rows ────────────────────────────────────────────────────────────────
function addVentaRow(tabId) {
  const tab = tabs.find(t=>t.id===tabId);
  if (!tab) return;
  const row = { id:newId(), cantidad:'', producto:'', costo:'', precio:'' };
  tab.ventaRows.push(row);
  renderVentaRow(tabId, row);
  refreshTotals(tabId);
}

function renderVentaRow(tabId, row) {
  const tbody = document.getElementById('vtbody_'+tabId);
  if (!tbody) return;
  const tr = document.createElement('tr');
  tr.id = 'tr_'+row.id;

  // Build cells manually with DOM so inputs keep focus
  const fields = [
    {type:'number', field:'cantidad', placeholder:'0',    fn: r=>r.cantidad},
    {type:'text',   field:'producto', placeholder:'Nombre del producto', fn: r=>r.producto},
    {type:'number', field:'costo',    placeholder:'0.00', fn: r=>r.costo},
    {type:'number', field:'precio',   placeholder:'0.00', fn: r=>r.precio},
  ];
  fields.forEach((f, fi) => {
    const td = document.createElement('td');
    const inp = document.createElement('input');
    inp.className = 'cell-input';
    inp.type = f.type;
    if (f.type==='number') { inp.min='0'; inp.step='any'; }
    inp.value = f.fn(row);
    inp.placeholder = f.placeholder;
    inp.addEventListener('input', function() {
      row[f.field] = this.value;

// ── Totals ─────────────────────────────────────────────────────────────────────
function refreshTotals(tabId) {
  const tab=tabs.find(t=>t.id===tabId);
  if (!tab) return;

  // Ventas
  let vC=0, vG=0;
  tab.ventaRows.forEach(r=>{
    const q=parseFloat(r.cantidad)||0, c=parseFloat(r.costo)||0, p=parseFloat(r.precio)||0;
    vC+=q*c; vG+=q*p;
  });
  const vtEl=document.getElementById('vtotals_'+tabId);
  if (vtEl) vtEl.innerHTML=
    card('tc-costo','🧾','Costo Total',fmt(vC))+
    card('tc-ganancia','💰','Ganancia Total',fmt(vG));

  // Paletas
  let pC=0, pG=0;
  tab.paletaRows.forEach(r=>{
    const q=parseFloat(r.cantidad)||0, c=parseFloat(r.costo)||0, p=parseFloat(r.precio)||0;
    pC+=q*c; pG+=q*p;
  });
  const palEl=document.getElementById('paltotals_'+tabId);
  if (palEl) palEl.innerHTML=
    card('tc-paletas-costo','🍭','Costo Total',fmt(pC))+
    card('tc-paletas-ganancia','💰','Ganancia Total',fmt(pG));

  // Personal
  const by={ Moises:0, Yohali:0, Casa:0 };
  tab.personalRows.forEach(r=>{
    const q=parseFloat(r.cantidad)||0, c=parseFloat(r.costo)||0;
    if (by[r.persona]!==undefined) by[r.persona]+=q*c;
  });
  const tot=by.Moises+by.Yohali+by.Casa;
  const ptEl=document.getElementById('ptotals_'+tabId);
  if (ptEl) ptEl.innerHTML=
    card('tc-personal','🏠','Total Uso Personal',fmt(tot))+
    (by.Moises>0?card('tc-moises','👤','Moises', fmt(by.Moises)):'')+
    (by.Yohali>0?card('tc-yohali','👤','Yohali', fmt(by.Yohali)):'')+
    (by.Casa>0  ?card('tc-casa',  '🏡','Casa',   fmt(by.Casa))  :'');

  // Gran Total
  const granTotal=vC+pC+tot;
  const gtGrid=document.getElementById('grantotal-grid_'+tabId);
  const gtSum=document.getElementById('grantotal-sum_'+tabId);
  if (gtGrid) gtGrid.innerHTML=
    gtCard('🛒','Costo Productos Venta',fmt(vC))+
    gtCard('🍭','Costo Paletas',fmt(pC))+
    gtCard('🏠','Costo Uso Personal',fmt(tot));
  if (gtSum) gtSum.textContent=fmt(granTotal);
}

// ── Cálculo y render de resultados ───────────────────────────────────────────
function calcCostesTab(tabId) {
  const tab = tabs.find(t=>t.id===tabId);
  if (!tab) return { costoProductos:0, costoPaletas:0, costoPersonal:0, costoTotal:0, costoReal:0 };

  let costoProductos = 0;
  tab.ventaRows.forEach(r => { const q=parseFloat(r.cantidad)||0, c=parseFloat(r.costo)||0; costoProductos+=q*c; });

  let costoPaletas = 0;
  tab.paletaRows.forEach(r => { const q=parseFloat(r.cantidad)||0, c=parseFloat(r.costo)||0; costoPaletas+=q*c; });

  let costoPersonal = 0;
  tab.personalRows.forEach(r => { const q=parseFloat(r.cantidad)||0, c=parseFloat(r.costo)||0; costoPersonal+=q*c; });

  const costoTotal = costoProductos + costoPaletas + costoPersonal;
  const costoReal  = costoTotal - costoPersonal;
  return { costoProductos, costoPaletas, costoPersonal, costoTotal, costoReal };
}

const STORAGE_KEY = 'antunez_v1';
let saveTimeout = null;

function buildStateObject() {
  return {
    version: 2,
    tabs: tabs.map(t => ({
      id: t.id, name: t.name, date: t.date,
      ventaRows:    t.ventaRows.map(r => ({...r})),
      paletaRows:   t.paletaRows.map(r => ({...r})),
      personalRows: t.personalRows.map(r => ({...r})),
      corteVentas: {
        efectivo:      t.corteVentas?.efectivo      ?? '',
        transferencia: t.corteVentas?.transferencia ?? '',
        debe:          t.corteVentas?.debe          ?? '',
        deudores:     (t.corteVentas?.deudores || []).map(d => ({...d})),
        descuento:     t.corteVentas?.descuento     ?? '',
      },
    })),
    activeTab,
    tabCounter,
  };
}

function applyState(state) {
  if (!state || !state.tabs || !state.tabs.length) return false;
  tabCounter = state.tabCounter || 0;
  tabs = state.tabs;
  // Asegurar arrays aunque vengan de versión anterior
  tabs.forEach(t => {
    t.ventaRows    = t.ventaRows    || [];
    t.paletaRows   = t.paletaRows   || [];
    t.personalRows = t.personalRows || [];
    // Compatibilidad hacia atrás: JSON sin corteVentas (versión anterior)
    if (!t.corteVentas) {
      t.corteVentas = { efectivo:'', transferencia:'', debe:'', deudores:[], descuento:'' };
    } else {
      t.corteVentas.deudores  = t.corteVentas.deudores  || [];
      t.corteVentas.descuento = t.corteVentas.descuento ?? '';
    }
  });
  activeTab = state.activeTab || tabs[0].id;

  // Limpiar paneles anteriores
  document.getElementById('mainContent').innerHTML = '';
  renderTabs();
  tabs.forEach(tab => renderPanel(tab.id));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel_' + activeTab);
  if (panel) panel.classList.add('active');
  return true;
}

// ── localStorage (respaldo rápido) ────────────────────────────────────────────
function saveToLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(buildStateObject()));
  } catch(e) {}
}

function loadFromLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    return applyState(JSON.parse(raw));
  } catch(e) { return false; }
}

// Guardado con debounce: no guarda en cada tecla, sino 800ms después de dejar de teclear
function saveState() {
  if (firestoreLoading) return; // evitar guardar mientras se está cargando/inicializando
  clearTimeout(saveTimeout);
  showSavingIndicator();
  saveTimeout = setTimeout(() => {
    saveToLocal();        // respaldo inmediato en este navegador
    saveToFirestore();     // guardado en la nube (todos los dispositivos)
  }, 800);
}

function showSavedIndicator() {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  el.innerHTML = '<span class="save-dot"></span> Guardado';
}

function showSavingIndicator() {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  el.innerHTML = '<span class="save-dot saving"></span> Guardando…';
}

function showErrorIndicator() {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  el.innerHTML = '<span class="save-dot error"></span> Error al guardar';
}

// ── Firebase Firestore (almacenamiento en la nube) ────────────────────────────
let firestoreLoading = false;   // evita guardar mientras estamos cargando datos remotos
let firestoreReady = false;

async function saveToFirestore() {
  if (!window.__firebaseReady || firestoreLoading) return;
  try {
    const { db, doc, setDoc, serverTimestamp, DOC_REF } = window.__firebase;
    const data = buildStateObject();
    data._updatedAt = serverTimestamp();
    await setDoc(DOC_REF, data);
    showSavedIndicator();
  } catch (e) {
    console.error('Error guardando en Firestore:', e);
    showErrorIndicator();
  }
}

async function loadFromFirestore() {
  if (!window.__firebaseReady) return false;
  try {
    const { getDoc, DOC_REF } = window.__firebase;
    const snap = await getDoc(DOC_REF);
    if (!snap.exists()) return false;
    const data = snap.data();
    if (!data || !data.tabs || !data.tabs.length) return false;
    firestoreLoading = true;
    const ok = applyState(data);
    firestoreLoading = false;
    if (ok) saveToLocal(); // sincronizar respaldo local
    return ok;
  } catch (e) {
    console.error('Error cargando de Firestore:', e);
    showErrorIndicator();
    return false;
  }
}

// Escuchar cambios en tiempo real (ej. si abres la app en otro dispositivo)
function suscribirCambiosRemotos() {
  if (!window.__firebaseReady) return;
  const { onSnapshot, DOC_REF } = window.__firebase;
  onSnapshot(DOC_REF, (snap) => {
    if (firestoreLoading || !snap.exists()) return;
    const data = snap.data();
    if (!data || !data.tabs || !data.tabs.length) return;
    // Solo recargar si el cambio vino de otro dispositivo (no de nosotros mismos)
    const localStr = JSON.stringify(buildStateObject().tabs);
    const remoteStr = JSON.stringify(data.tabs);
    if (localStr !== remoteStr) {
      firestoreLoading = true;
      applyState(data);
      firestoreLoading = false;
      saveToLocal();
    }
  }, (e) => {
    console.error('Error en suscripción Firestore:', e);
  });
}

// ── Exportar a archivo .json (guarda en tu disco) ─────────────────────────────
function exportarDatos() {
  try {
    const data = JSON.stringify(buildStateObject(), null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const fecha = new Date().toISOString().slice(0,10);
    a.download = 'antunez_datos_' + fecha + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showSavedIndicator();
  } catch(e) {
    alert('Error al exportar: ' + e.message);
  }
}

// ── Importar desde archivo .json (carga desde tu disco) ───────────────────────
function importarDatos(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const state = JSON.parse(e.target.result);
      if (applyState(state)) {
        saveToLocal();
        saveToFirestore();
        alert('✅ Datos cargados correctamente.');
      } else {
        alert('❌ El archivo no tiene un formato válido de Antunez.');
      }
    } catch(err) {
      alert('❌ Error al leer el archivo: ' + err.message);
    }
    input.value = ''; // reset para poder cargar el mismo archivo otra vez
  };
  reader.readAsText(file);
}

// Auto-guardar en cada cambio relevante
const _origRefreshTotals = refreshTotals;
refreshTotals = function(tabId) {
  _origRefreshTotals(tabId);
  refreshCorte(tabId);          // recalcular corte al cambiar costos
  saveState();
};

const _origUpdateTabDate = updateTabDate;
updateTabDate = function(id, val) { _origUpdateTabDate(id, val); saveState(); };

const _origRemoveTab = removeTab;
removeTab = function(id) { _origRemoveTab(id); saveState(); };

const _origConfirmAddTab = confirmAddTab;
confirmAddTab = function() { _origConfirmAddTab(); saveState(); };

// Guardar justo antes de cerrar
window.addEventListener('beforeunload', () => { clearTimeout(saveTimeout); saveToLocal(); });

// ── Init ───────────────────────────────────────────────────────────────────────
async function iniciarApp() {
  firestoreLoading = true; // bloquear guardados automáticos mientras se inicializa

  // 1) Mientras esperamos Firebase, mostrar algo de inmediato con lo que haya en localStorage
  const cargoLocal = loadFromLocal();
  if (!cargoLocal) {
    const today = new Date().toISOString().slice(0,10);
    createTab(fmtDate(today), today);
  }

  // 2) Esperar a que Firebase esté listo (máx. 5s) y luego intentar cargar desde la nube
  const esperarFirebase = new Promise(resolve => {
    if (window.__firebaseReady) return resolve(true);
    window.addEventListener('firebase-ready', () => resolve(true), { once: true });
    setTimeout(() => resolve(false), 5000);
  });
  const fbListo = await esperarFirebase;

  firestoreLoading = false; // ya se puede guardar normalmente

  if (fbListo) {
    showSavingIndicator();
    const cargoRemoto = await loadFromFirestore();
    if (!cargoRemoto && !cargoLocal) {
      // No había nada en la nube ni localmente: subimos lo recién creado
      await saveToFirestore();
    } else {
      showSavedIndicator();
    }
    suscribirCambiosRemotos();
  } else {
    showErrorIndicator();
  }
}

iniciarApp();

</script>
